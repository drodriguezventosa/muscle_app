version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: monthly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    groups:
      npm-deps:
        patterns: ["*"]
    ignore:
      # ESLint 9+ requires a flat-config migration (eslint.config.js). Hold the
      # major until we migrate; minor/patch updates still flow through.
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
