version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: monthly
    groups:
      python-deps:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: monthly
    # Group only non-breaking updates into a single PR. Major bumps of the
    # frontend toolchain (Vite, Vitest, TypeScript, Vue Router, Pinia, ESLint,
    # etc.) are breaking migrations, so we ignore them here and upgrade them
    # deliberately instead of receiving one giant "bomb" PR.
    groups:
      npm-minor-patch:
        update-types: ["minor", "patch"]
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    groups:
      github-actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: monthly
