name: Deploy

# Continuous deployment on merge to main.
# - Backend  → pushed to a Hugging Face Space (Docker), which rebuilds and serves.
# - Frontend → deployed by Vercel's native GitHub integration (no job here).
# - Database → the Space bootstraps the schema + catalog on first boot.
#
# The backend job is skipped until the `HF_SPACE` repo variable is set, so the
# workflow is a no-op until you finish the one-time setup in infra/deploy/README.md.

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy-backend:
    if: vars.HF_SPACE != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble the Space contents
        run: |
          mkdir space
          cp -r backend/. space/
          cp infra/hf-space/Dockerfile infra/hf-space/README.md infra/hf-space/bootstrap.sh space/
          # Do not ship local/dev artifacts.
          rm -rf space/build space/.pytest_cache space/*.egg-info

      - name: Push to the Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }} # e.g. "your-user/muscleapp-api"
        run: |
          cd space
          git init -q -b main
          git config user.email "ci@muscleapp.local"
          git config user.name "MuscleApp CI"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA::7}"
          git push -f "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}.git" main
