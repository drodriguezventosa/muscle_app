name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token by default (OWASP A05).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, types, security, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: pip install .[dev]
      - name: Lint (ruff)
        run: ruff check . && ruff format --check .
      - name: Type-check (mypy)
        run: mypy app
      - name: Security (bandit)
        run: bandit -r app -c pyproject.toml
      - name: Dependency audit (pip-audit)
        run: pip-audit || true # non-blocking until deps are pinned
      - name: Tests + coverage gate
        run: pytest
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          flags: backend
        continue-on-error: true

  frontend:
    name: Frontend (lint, types, tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build

  docker-build:
    name: Docker build + image scan (Trivy)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t muscleapp-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t muscleapp-frontend:ci ./frontend
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: muscleapp-backend:ci
          severity: HIGH,CRITICAL
          exit-code: "0" # report only for now; flip to "1" to enforce
