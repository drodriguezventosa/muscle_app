name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Least-privilege token by default (OWASP A05).
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint, types, security, tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    # PostgreSQL + pgvector service so integration tests and migrations run for real.
    # Credentials are taken from repository secrets, never hardcoded.
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U ${{ secrets.POSTGRES_USER }} -d ${{ secrets.POSTGRES_DB }}"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      TEST_DATABASE_URL: postgresql+asyncpg://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/${{ secrets.POSTGRES_DB }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
          cache: pip
      - name: Install dependencies
        run: pip install .[dev]
      - name: Lint (ruff)
        run: ruff check . && ruff format --check .
      - name: Type-check (mypy)
        run: mypy app
      - name: Security (bandit)
        run: bandit -r app -c pyproject.toml
      - name: Dependency audit (pip-audit)
        run: pip-audit || true # non-blocking until deps are pinned
      - name: Migrations smoke test (upgrade + downgrade)
        run: |
          alembic upgrade head
          alembic downgrade base
      - name: Tests + coverage gate
        run: pytest
      - name: Upload coverage
        uses: codecov/codecov-action@v7
        with:
          flags: backend
        continue-on-error: true

  frontend:
    name: Frontend (lint, types, tests, build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci || npm install
      - name: Lint
        run: npm run lint
      - name: Type-check
        run: npm run typecheck
      - name: Unit tests
        run: npm run test
      - name: Build
        run: npm run build

  docker-build:
    name: Docker build + image scan (Trivy)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -t muscleapp-backend:ci ./backend
      - name: Build frontend image
        run: docker build -t muscleapp-frontend:ci ./frontend
      - name: Scan backend image (Trivy)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: muscleapp-backend:ci
          severity: HIGH,CRITICAL
          exit-code: "0" # report only for now; flip to "1" to enforce
