name: Keep-alive

# Render's free web service spins down after ~15 min of inactivity, so the next
# request pays a cold start (~50s). This pings /health periodically to keep it
# awake. A single free instance running ~24/7 stays within Render's monthly
# instance-hours, so it costs nothing.
#
# Target URL comes from the repo variable BACKEND_URL, falling back to the known
# Render URL. Note: GitHub's scheduled runs can be delayed under load — if you
# need a stricter cadence, a free external monitor (UptimeRobot, cron-job.org)
# is more reliable.

on:
  schedule:
    - cron: "*/10 * * * *" # every 10 minutes
  workflow_dispatch:

# Never let overlapping runs pile up.
concurrency:
  group: keep-alive
  cancel-in-progress: true

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          URL="${{ vars.BACKEND_URL || 'https://muscleapp-api.onrender.com' }}"
          echo "Pinging ${URL}/health"
          # Do not fail the workflow if the backend is mid-cold-start; just report.
          if curl -fsS --max-time 90 "${URL}/health"; then
            echo "" && echo "awake"
          else
            echo "ping failed (backend may be waking up)"
          fi
