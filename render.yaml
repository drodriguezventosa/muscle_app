# Render Blueprint — free, no-card backend for MuscleApp (see ADR-0010 / ADR-0014).
# CD is native: Render auto-deploys on every push to the connected branch (main),
# so no GitHub Actions workflow is needed. The frontend deploys on Vercel the same way.
#
# Secrets/connection values (marked `sync: false`) are set once in the Render
# dashboard — never committed. On boot the service runs `app.bootstrap`
# (create extension + tables + seed + embedding backfill, all idempotent) and
# then serves the API with uvicorn on Render's injected $PORT.
services:
  - type: web
    name: muscleapp-api
    runtime: python
    plan: free
    region: frankfurt
    rootDir: backend
    buildCommand: pip install .
    startCommand: python -m app.bootstrap && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: APP_ENV
        value: production
      - key: DB_SSL
        value: "true"
      - key: EMBEDDING_PROVIDER
        value: gemini
      - key: LLM_PROVIDER
        value: groq
      - key: CACHE_PROVIDER
        value: redis
      # --- Set these in the Render dashboard (Environment); never committed ---
      - key: POSTGRES_HOST # from Neon
        sync: false
      - key: POSTGRES_PORT
        sync: false
      - key: POSTGRES_USER
        sync: false
      - key: POSTGRES_PASSWORD
        sync: false
      - key: POSTGRES_DB
        sync: false
      - key: GEMINI_API_KEY # Google AI Studio (free) — used for embeddings
        sync: false
      - key: GROQ_API_KEY # console.groq.com (free, no card) — chat LLM
        sync: false
      - key: REDIS_URL # Upstash (free, no card) — rediss://… ; empty ⇒ in-memory cache
        sync: false
      - key: CORS_ORIGINS # your Vercel URL, e.g. https://muscleapp.vercel.app
        sync: false
